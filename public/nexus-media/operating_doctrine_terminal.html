<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Operating Doctrine Terminal</title>
<style>
  body { margin:0; background:#03060c; color:#b8c4d4; font-family:"SF Mono","Fira Code",ui-monospace,monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .term { width:100%; max-width:740px; background:#070c16; border:1px solid #1a2535; border-radius:4px; overflow:hidden; box-shadow:0 0 50px rgba(0,0,0,0.7); }
  .bar { background:#0c1422; padding:0.55rem 1rem; font-size:0.7rem; color:#6b7c90; display:flex; justify-content:space-between; border-bottom:1px solid #1a2535; }
  .screen { padding:1.5rem 1.4rem; font-size:0.88rem; line-height:1.7; min-height:360px; }
  .prompt { color:#d4af37; }
  .dim { color:#5c6b80; }
  .hl { color:#e0e6ed; }
  .cursor { display:inline-block; width:8px; height:14px; background:#d4af37; margin-left:2px; animation:blink 1s step-end infinite; vertical-align:middle; }
  @keyframes blink { 50% { opacity:0; } }
  .line { margin-bottom:0.55rem; }
</style>
</head>
<body>
  <div class="term">
    <div class="bar">
      <span>NEXUS://operating-doctrine</span>
      <span>READ-ONLY</span>
    </div>
    <div class="screen" id="screen"></div>
  </div>
<script>
const lines = [
  {t:500, html:'<span class="prompt">$</span> <span class="dim">load doctrine --core</span>'},
  {t:900, html:'<div class="line hl">1. A human is accountable.</div>'},
  {t:700, html:'<div class="line dim">   Responsibility cannot be delegated to software.</div>'},
  {t:800, html:'<div class="line hl">2. Decisions are based on evidence.</div>'},
  {t:700, html:'<div class="line dim">   Confidence is never a substitute for evidence.</div>'},
  {t:800, html:'<div class="line hl">3. AI is a professional tool.</div>'},
  {t:700, html:'<div class="line dim">   It extends capability. It does not replace judgment.</div>'},
  {t:1000, html:'<div class="line dim">────────────────────────────────────────</div>'},
  {t:600, html:'<div class="line"><span class="prompt">status</span> <span class="hl">ACTIVE CONSTRAINTS</span></div>'},
  {t:500, html:'<div class="line dim">These rules govern research, communication,</div>'},
  {t:500, html:'<div class="line dim">validation, and every external claim.</div>'},
  {t:900, html:'<div class="line"><span class="prompt">$</span> <span class="cursor"></span></div>'}
];
const screen = document.getElementById('screen');
let i = 0;
function next(){ if(i>=lines.length) return; screen.innerHTML += lines[i].html; i++; setTimeout(next, lines[i-1].t); }
setTimeout(next, 700);
</script>
</body>
</html>
