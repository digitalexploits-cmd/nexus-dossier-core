<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bounded Thesis Terminal</title>
<style>
  body {
    margin: 0;
    background: #03060c;
    color: #b8c4d4;
    font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .term {
    width: 100%;
    max-width: 720px;
    background: #070c16;
    border: 1px solid #1a2535;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.7);
  }
  .bar {
    background: #0c1422;
    padding: 0.55rem 1rem;
    font-size: 0.7rem;
    color: #6b7c90;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #1a2535;
  }
  .screen {
    padding: 1.4rem 1.3rem;
    font-size: 0.88rem;
    line-height: 1.65;
    min-height: 340px;
  }
  .prompt { color: #d4af37; }
  .dim { color: #5c6b80; }
  .hl { color: #e0e6ed; }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #d4af37;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .line { margin-bottom: 0.6rem; }
</style>
</head>
<body>
  <div class="term">
    <div class="bar">
      <span>NEXUS://thesis/bounded</span>
      <span>READ-ONLY • REVIEW-SAFE</span>
    </div>
    <div class="screen" id="screen"></div>
  </div>
<script>
const lines = [
  { t: 400, html: '<span class="prompt">$</span> <span class="dim">load thesis --current</span>' },
  { t: 900, html: '<div class="line hl">SINE~WaiV is being evaluated as a current-domain</div>' },
  { t: 700, html: '<div class="line hl">spectral-state estimation framework</div>' },
  { t: 700, html: '<div class="line hl">for improving fault-relevant observability</div>' },
  { t: 700, html: '<div class="line hl">in motor current under industrial electrical noise.</div>' },
  { t: 1100, html: '<div class="line dim">──────────────────────────────────────────────</div>' },
  { t: 600, html: '<div class="line"><span class="prompt">constraints</span></div>' },
  { t: 500, html: '<div class="line dim">• no universal observability claim</div>' },
  { t: 400, html: '<div class="line dim">• no “vibration sensors obsolete” claim</div>' },
  { t: 400, html: '<div class="line dim">• domain boundaries mandatory</div>' },
  { t: 400, html: '<div class="line dim">• evidence category must match language</div>' },
  { t: 900, html: '<div class="line dim">──────────────────────────────────────────────</div>' },
  { t: 600, html: '<div class="line"><span class="prompt">status</span> <span class="hl">UNDER ACTIVE VALIDATION</span></div>' },
  { t: 800, html: '<div class="line dim">Phase I will determine measurable advantage</div>' },
  { t: 600, html: '<div class="line dim">over accepted spectral baselines.</div>' },
  { t: 1000, html: '<div class="line"><span class="prompt">$</span> <span class="cursor"></span></div>' }
];

const screen = document.getElementById('screen');
let i = 0;

function next() {
  if (i >= lines.length) return;
  const item = lines[i];
  screen.innerHTML += item.html;
  i++;
  setTimeout(next, item.t);
}
setTimeout(next, 600);
</script>
</body>
</html>
