<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reproducibility Gate — NEXUS</title>
<style>
  :root {
    --bg: #04070e;
    --panel: #0a101c;
    --gold: #d4af37;
    --text: #cdd6e4;
    --muted: #6d7d93;
    --ok: #3dba7c;
    --warn: #c9a227;
    --fail: #c45c5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .gate {
    width: 100%;
    max-width: 680px;
    background: var(--panel);
    border: 1px solid #1a2638;
    border-radius: 3px;
    overflow: hidden;
  }
  header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid #1a2638;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 {
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 0.14em;
    font-weight: 600;
  }
  .body { padding: 1.4rem 1.25rem; }
  .check {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid #141e2c;
  }
  .check:last-of-type { border-bottom: none; }
  .check input {
    margin-top: 0.2rem;
    accent-color: var(--gold);
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  .check label {
    font-size: 0.82rem;
    line-height: 1.45;
    cursor: pointer;
  }
  .check label span {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }
  .score-panel {
    margin-top: 1.4rem;
    padding: 1.1rem;
    background: #060c16;
    border: 1px solid #1a2638;
    border-radius: 2px;
  }
  .score-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }
  .score-value {
    font-size: 1.8rem;
    color: var(--gold);
    font-weight: 600;
  }
  .verdict {
    margin-top: 0.7rem;
    font-size: 0.8rem;
    line-height: 1.5;
  }
  footer {
    padding: 0.7rem 1.25rem;
    border-top: 1px solid #1a2638;
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="gate">
    <header>
      <h1>REPRODUCIBILITY GATE</h1>
      <span style="font-size:0.7rem;color:var(--muted)">EXPERIMENT ADMISSION</span>
    </header>
    <div class="body">
      <div class="check">
        <input type="checkbox" id="c1" onchange="score()">
        <label for="c1">
          Dataset and exact channels are named
          <span>No ambiguous “public dataset” references</span>
        </label>
      </div>
      <div class="check">
        <input type="checkbox" id="c2" onchange="score()">
        <label for="c2">
          Baseline method is fully specified
          <span>Same window, same preprocessing, same metrics</span>
        </label>
      </div>
      <div class="check">
        <input type="checkbox" id="c3" onchange="score()">
        <label for="c3">
          Processing steps are documented enough to re-run
          <span>Another engineer could reproduce the numbers</span>
        </label>
      </div>
      <div class="check">
        <input type="checkbox" id="c4" onchange="score()">
        <label for="c4">
          Domain boundaries are respected
          <span>Current-domain vs vibration-domain never collapsed</span>
        </label>
      </div>
      <div class="check">
        <input type="checkbox" id="c5" onchange="score()">
        <label for="c5">
          Evidence category is declared
          <span>Validated / Experimental / Observation / Hypothesis / Speculation</span>
        </label>
      </div>
      <div class="check">
        <input type="checkbox" id="c6" onchange="score()">
        <label for="c6">
          Limitations are stated in the same place as the claim
          <span>No silent omission of failure modes or noise conditions</span>
        </label>
      </div>

      <div class="score-panel">
        <div class="score-label">REPRODUCIBILITY SCORE</div>
        <div class="score-value" id="score">0 / 6</div>
        <div class="verdict" id="verdict">Check the conditions that are true for the result you want to promote.</div>
      </div>
    </div>
    <footer>
      <span>AI Base³ • NEXUS</span>
      <span>Results below threshold stay internal</span>
    </footer>
  </div>

<script>
function score() {
  const ids = ['c1','c2','c3','c4','c5','c6'];
  let s = 0;
  ids.forEach(id => { if (document.getElementById(id).checked) s++; });
  document.getElementById('score').textContent = s + ' / 6';
  const v = document.getElementById('verdict');
  if (s === 6) {
    v.style.color = '#3dba7c';
    v.textContent = 'Gate open. This result meets the minimum bar for external or proposal use.';
  } else if (s >= 4) {
    v.style.color = '#c9a227';
    v.textContent = 'Partial. Usable internally or as experimental. Close the remaining gaps before promotion.';
  } else {
    v.style.color = '#c45c5c';
    v.textContent = 'Gate closed. Too many missing conditions. Keep the result internal until reproducibility is improved.';
  }
}
</script>
</body>
</html>
