<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phase Boundary Terminal</title>
<style>
  body { margin:0; background:#03060c; color:#b8c4d4; font-family:"SF Mono","Fira Code",ui-monospace,monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .term { width:100%; max-width:720px; background:#070c16; border:1px solid #1a2535; border-radius:4px; overflow:hidden; box-shadow:0 0 50px rgba(0,0,0,0.7); }
  .bar { background:#0c1422; padding:0.55rem 1rem; font-size:0.7rem; color:#6b7c90; display:flex; justify-content:space-between; border-bottom:1px solid #1a2535; }
  .screen { padding:1.5rem 1.4rem; font-size:0.88rem; line-height:1.7; min-height:340px; }
  .prompt { color:#d4af37; }
  .dim { color:#5c6b80; }
  .hl { color:#e0e6ed; }
  .warn { color:#c9a227; }
  .cursor { display:inline-block; width:8px; height:14px; background:#d4af37; margin-left:2px; animation:blink 1s step-end infinite; vertical-align:middle; }
  @keyframes blink { 50% { opacity:0; } }
  .line { margin-bottom:0.5rem; }
</style>
</head>
<body>
  <div class="term">
    <div class="bar">
      <span>NEXUS://phase-boundary</span>
      <span>STRICT SEPARATION</span>
    </div>
    <div class="screen" id="screen"></div>
  </div>
<script>
const lines = [
  {t:500, html:'<span class="prompt">$</span> <span class="dim">check phase --current</span>'},
  {t:900, html:'<div class="line hl">CURRENT PHASE: Validation / Phase I framing</div>'},
  {t:800, html:'<div class="line dim">────────────────────────────────────────</div>'},
  {t:600, html:'<div class="line"><span class="prompt">allowed</span></div>'},
  {t:500, html:'<div class="line dim">• bounded technical thesis statements</div>'},
  {t:400, html:'<div class="line dim">• evidence-category-tagged results</div>'},
  {t:400, html:'<div class="line dim">• dataset domain separation</div>'},
  {t:400, html:'<div class="line dim">• explicit limitations language</div>'},
  {t:700, html:'<div class="line dim">────────────────────────────────────────</div>'},
  {t:600, html:'<div class="line"><span class="prompt">forbidden</span> <span class="warn">until higher evidence</span></div>'},
  {t:500, html:'<div class="line dim">• universal observability claims</div>'},
  {t:400, html:'<div class="line dim">• “sensors obsolete” language</div>'},
  {t:400, html:'<div class="line dim">• performance guarantees</div>'},
  {t:400, html:'<div class="line dim">• collapsed dataset domains</div>'},
  {t:900, html:'<div class="line"><span class="prompt">$</span> <span class="cursor"></span></div>'}
];
const screen = document.getElementById('screen');
let i = 0;
function next(){ if(i>=lines.length) return; screen.innerHTML += lines[i].html; i++; setTimeout(next, lines[i-1].t); }
setTimeout(next, 600);
</script>
</body>
</html>
