name: Observability Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test -- --reporter=verbose

      - name: Production build
        run: npm run build

      - name: Summary
        if: always()
        run: |
          echo "### Observability Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Lint, test, and build completed for commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
